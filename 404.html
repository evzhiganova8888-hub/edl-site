<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FAF9F6">
  <title>Страница не найдена · EDL</title>
  <meta name="description" content="Эта страница не найдена. Вернитесь на главную.">
  <meta name="robots" content="noindex">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap">

  <link rel="stylesheet" href="styles.css">

  <style>
    .err-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: var(--s-7);
      background: var(--bg-canvas);
    }
    .err-content {
      text-align: center;
      max-width: 60ch;
    }
    .err-code {
      font-family: var(--ff-display);
      font-size: clamp(8rem, 24vw, 16rem);
      font-weight: 800;
      letter-spacing: -0.06em;
      line-height: 0.85;
      color: var(--text-primary);
      margin-bottom: var(--s-5);
    }
    .err-code .accent {
      color: var(--accent-lime);
    }
    .err-title {
      font-family: var(--ff-display);
      font-size: var(--fs-h2-fluid);
      font-weight: 700;
      letter-spacing: var(--tracking-tight);
      margin-bottom: var(--s-5);
      line-height: var(--lh-tight);
    }
    .err-sub {
      font-size: var(--fs-20);
      color: var(--text-secondary);
      margin-bottom: var(--s-7);
      line-height: var(--lh-normal);
    }
    .err-actions {
      display: flex;
      gap: var(--s-4);
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

  <main class="err-page">
    <div class="err-content">
      <div class="err-code">4<span class="accent">0</span>4</div>
      <h1 class="err-title">Страница потерялась в&nbsp;операционке</h1>
      <p class="err-sub">
        Бывает. Зато у нас на главной есть всё, чтобы такого больше не&nbsp;случалось — и&nbsp;у вас, и&nbsp;у ваших клиентов.
      </p>
      <div class="err-actions">
        <a href="index.html" class="btn btn--primary">На главную</a>
        <a href="https://t.me/elephantdreamscommunity" target="_blank" rel="noopener noreferrer" class="btn btn--secondary">Канал в Telegram</a>
      </div>
    </div>
  </main>

</body>
</html>
